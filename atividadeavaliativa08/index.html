<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header fixo e botões</title>
    <style>

    </style>
</head>

<body>
    <h2>Soma e Média</h2>

    <p>
        <label for="valorA">Valor para A:</label>
        <input type="number" id="valorA" placeholder="Valor para A">
    </p>

    <p>
        <label for="valorB">Valor para B:</label>
        <input type="number" id="valorB" placeholder="Valor para B">
    </p>

    <p>
        <label for="valorC">Valor para C:</label>
        <input type="number" id="valorC" placeholder="Valor para C">
    </p>

    <p>
        <label for="valorD">Valor para D:</label>
        <input type="number" id="valorD" placeholder="Valor para D">
    </p>

    <div id="textoSoma"></div>
    <div id="textoMedia"></div>
    <div id="textoMaior"></div>
    <div id="textoMenor"></div>

    <button id="btnSoma">Soma</button>
    <button id="btnMedia">Média</button>
    <button id="btnMaior">Maior</button>
    <button id="btnMenor">Menor</button>
    <button id="btnFechar">Fechar</button>
</body>

<script>
    let soma = 0;
    let media = 0.0;
    let a = 0;
    let b = 0;
    let c = 0;
    let d = 0;

    const btnSoma = document.getElementById('btnSoma');
    const btnMedia = document.getElementById('btnMedia');
    const btnMaior = document.getElementById('btnMaior');
    const btnMenor = document.getElementById('btnMenor');
    const btnFechar = document.getElementById('btnFechar');

    btnSoma.addEventListener('click', () => {
        let textoSoma = document.getElementById('textoSoma');
        a = parseInt(document.getElementById('valorA').value) || 0;
        b = parseInt(document.getElementById('valorB').value) || 0;
        c = parseInt(document.getElementById('valorC').value) || 0;
        d = parseInt(document.getElementById('valorD').value) || 0;
        let resultado = (a + b + c + d);

        textoSoma.textContent = `A soma é ${resultado}`;
    });

    btnMedia.addEventListener('click', () => {
        let textoMedia = document.getElementById('textoMedia');
        a = parseInt(document.getElementById('valorA').value) || 0;
        b = parseInt(document.getElementById('valorB').value) || 0;
        c = parseInt(document.getElementById('valorC').value) || 0;
        d = parseInt(document.getElementById('valorD').value) || 0;
        let resultado = (a + b + c + d) / 4;

        textoMedia.textContent = `A média é ${resultado}`;
    });

    btnMaior.addEventListener('click', () => {
        let textoMaior = document.getElementById('textoMaior');
        a = parseInt(document.getElementById('valorA').value) || 0;
        b = parseInt(document.getElementById('valorB').value) || 0;
        c = parseInt(document.getElementById('valorC').value) || 0;
        d = parseInt(document.getElementById('valorD').value) || 0;
        let resultado = Math.max(a, b, c, d);

        textoMaior.textContent = `O maior valor é ${resultado}`;
    });

    btnMenor.addEventListener('click', () => {
        let textoMenor = document.getElementById('textoMenor');
        a = parseInt(document.getElementById('valorA').value) || 0;
        b = parseInt(document.getElementById('valorB').value) || 0;
        c = parseInt(document.getElementById('valorC').value) || 0;
        d = parseInt(document.getElementById('valorD').value) || 0;
        let resultado = Math.min(a, b, c, d);

        textoMenor.textContent = `O menor valor é ${resultado}`;
    });

    btnFechar.addEventListener('click', () => {
        window.close();
    })
    
</script>

<p>
    Aluno: João Pedro do Espírito Santo Ribeiro ||

</p>

</html>

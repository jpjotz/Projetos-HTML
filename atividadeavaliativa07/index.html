<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header fixo e botões</title>
    <style>
        .content {
            text-align: center;
            border: 3px solid black;
            border-radius: 20px;
            max-width: 400px;
            margin: auto;
            padding: 20px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 2.5);
        }
    </style>
</head>

<body>
    <div class="content">
        <h2>Calculadora</h2>

        <p>
            <label for="a">Valor A:</label>
            <input type="number" id="a" placeholder="Digite o valor para A">
        </p>

        <p>
            <label for="b">Valor B:</label>
            <input type="number" id="b" placeholder="Digite o valor para B">
        </p>

        <button onclick="somar()">Somar</button>
        <button onclick="subtrair()">Subtrair</button>
        <button onclick="multiplicar()">Multiplicar</button>
        <button onclick="dividir()">Dividir</button>
        <button onclick="fechar()" title="Fechar essa página">Fechar</button>

        <div id="resultadoDiv"></div>
    </div>

    <script>

        function somar() {
            let a = document.getElementById("a").value;
            let b = document.getElementById('b').value;
            if (verificarValores(a, b)) {
                let valor = parseInt(a) + parseInt(b);
                imprimir(valor);
            }

        }

        function subtrair() {
            let a = document.getElementById("a").value;
            let b = document.getElementById('b').value;
            if (verificarValores(a, b)) {
                let valor = a - b;
                imprimir(valor);
            }

        }

        function multiplicar() {
            let a = document.getElementById("a").value;
            let b = document.getElementById('b').value;
            if (verificarValores(a, b)) {
                let valor = a * b;
                imprimir(valor);
            }

        }

        function dividir() {
            let a = document.getElementById("a").value;
            let b = document.getElementById('b').value;
            if (verificarValores(a, b)) {
                let valor = a / b;
                imprimir(valor.toFixed(3));
            }

        }

        function imprimir(valor) {
            let resultadoDiv = document.getElementById('resultadoDiv');
            resultadoDiv.innerHTML = `<p><b>Resultado: </b>${valor}</p>`;
        }

        function verificarValores(a, b) {
            if (a == "" || b == "") {
                alert("Impossível calcular para valores nulos!");
                return false;
            }

            if (a <= 0 || b <= 0) {
                alert("Números não permitidos!");
                return false;
            }

            return true;
        }

        function fechar() {
            window.close();
        }

    </script>

</body>

</p>

</html>
